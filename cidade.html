<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mundo Medieval - Cidade</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .status-top { background: #111; padding: 10px; border-bottom: 2px solid #ffcc00; margin-bottom: 20px; }
        .mapa-cidade { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 20px; }
        .local { 
            background: #1a1a1a; border: 2px solid #333; padding: 30px; border-radius: 15px; 
            cursor: pointer; width: 200px; transition: 0.3s; 
        }
        .local:hover { border-color: #ffcc00; background: #222; transform: translateY(-5px); }
        .local small { color: #888; display: block; margin-top: 5px; }
        b { color: #ffcc00; }
    </style>
</head>
<body>

    <div class="status-top">
        <span>💰 Seu Ouro: <b id="gold">0</b></span>
    </div>

    <h2>Vila do Amanhecer</h2>
    <p>Escolha um local para visitar:</p>

    <div class="mapa-cidade">
        <div id="estalagem" class="local" onclick="descansar()">
            🏨 Estalagem
            <small>(Recuperar HP/Mana - 10 Ouro)</small>
        </div>

        <div id="ferreiro" class="local" onclick="alert('O Ferreiro está forjando novas armas!')">
            ⚔️ Ferreiro
            <small>(Em breve: Loja)</small>
        </div>

        <div id="portal" class="local" onclick="irParaCombate()" style="border-color: #00ff00;">
            🌲 SAIR DA CIDADE
            <small><b>(Voltar para a Caça)</b></small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zkeshycglokyycuplczn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_iDavmG9sQzqW6jPrOCjsmQ_5ISCiZUF';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let heroi = null;

        async function carregarDadosCidade() {
            const heroiId = localStorage.getItem("heroi_selecionado_id");
            const { data } = await supabaseClient.from('personagens').select('*').eq('id', heroiId).single();
            if (data) {
                heroi = data;
                document.getElementById('gold').innerText = heroi.ouro || 0;
            }
        }

        async function descansar() {
            if (!heroi) return;
            if (heroi.ouro < 10) {
                alert("Ouro insuficiente!");
                return;
            }

            if (confirm("Pagar 10 de ouro para descansar?")) {
                const maxHP = 20 + (heroi.vitalidade * 10);
                const maxMP = 10 + (heroi.inteligencia * 5);

                const { error } = await supabaseClient.from('personagens').update({ 
                    ouro: heroi.ouro - 10, 
                    hp_atual: maxHP,
                    mana: maxMP 
                }).eq('id', heroi.id);

                if (!error) {
                    alert("Você está revigorado!");
                    location.reload();
                }
            }
        }

        function irParaCombate() { window.location.href = "jogo.html"; }
        carregarDadosCidade();
    </script>
</body>
</html>
