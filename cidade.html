<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vila do Amanhecer - Cidade</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .mapa-cidade { 
            background: #222; margin: 20px auto; width: 90%; max-width: 800px; height: 400px; 
            border-radius: 20px; border: 4px solid #444; position: relative;
            background-image: radial-gradient(#333 10%, transparent 10%); background-size: 20px 20px;
        }
        .local { 
            position: absolute; background: #333; border: 2px solid #00ff00; padding: 15px; 
            border-radius: 10px; cursor: pointer; transition: 0.3s; 
        }
        .local:hover { background: #00ff00; color: black; transform: scale(1.1); }
        
        #estalagem { top: 50px; left: 100px; }
        #ferreiro { top: 50px; right: 100px; }
        #portal { bottom: 50px; left: 50%; transform: translateX(-50%); border-color: #ffcc00; }

        .status-top { background: #111; padding: 10px; border-bottom: 2px solid #00ff00; display: flex; justify-content: space-around; }
    </style>
</head>
<body>

    <div class="status-top">
        <span>🏰 Vila do Amanhecer</span>
        <span>💰 Ouro: <b id="gold">0</b></span>
    </div>

    <h2>Bem-vindo à Cidade!</h2>
    <p>Aqui você pode se preparar para as próximas batalhas.</p>

    <div class="mapa-cidade">
        <div id="estalagem" class="local" onclick="avisar()">🛌 Estalagem<br><small>(Recuperar HP)</small></div>
        <div id="ferreiro" class="local" onclick="avisar()">⚔️ Ferreiro<br><small>(Em breve)</small></div>
        <div id="portal" class="local" onclick="irParaCombate()">🌲 SAIR DA CIDADE<br><b>(Ir para Monstros)</b></div>
    </div>

    <script>
        function irParaCombate() {
            window.location.href = "jogo.html";
        }

        function avisar() {
            alert("O dono do estabelecimento saiu para almoçar. Volte em breve!");
        }
    </script>
</body>
</html>
