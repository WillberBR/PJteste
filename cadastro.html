<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MMORPG Medieval</title>
    <style>
        body { background:#000; color:white; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
        .card { background:#111; padding:30px; border-radius:15px; border:1px solid #333; width:300px; text-align:center; box-shadow:0 0 20px rgba(0,217,255,0.1); }
        h1 { color:#00d9ff; text-shadow:0 0 10px #00d9ff; margin-bottom:25px; font-size:22px; }
        input { width:100%; padding:12px; margin-bottom:12px; background:#222; border:1px solid #444; color:white; border-radius:8px; box-sizing:border-box; outline:none; }
        input:focus { border-color:#00d9ff; }
        button { width:100%; padding:15px; background:#00d9ff; color:black; font-weight:bold; border:none; border-radius:8px; cursor:pointer; transition:0.3s; font-size:16px; }
        button:hover { background:#00b4d8; transform:scale(1.02); }
        .link-login { color:#666; font-size:13px; margin-top:20px; display:block; text-decoration:none; }
        .link-login:hover { color:#00d9ff; }
    </style>
</head>
<body>

    <div class="card">
        <h1>📜 NOVO PERFIL</h1>
        <input type="text" id="cadNome" placeholder="Seu Nome Real">
        <input type="email" id="cadEmail" placeholder="Seu e-mail">
        <input type="password" id="cadSenha" placeholder="Crie uma senha">
        <button onclick="executarCadastro()">CADASTRAR</button>
        
        <a href="index.html" class="link-login">Já tem conta? Voltar ao Login</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
