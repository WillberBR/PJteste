<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mundo Medieval - Criar Personagem</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #151515; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00ff00; text-transform: uppercase; letter-spacing: 2px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        .stats-box { background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 20px 0; text-align: left; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .btn-crear { background: #00ff00; color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-crear:hover { background: #00cc00; transform: scale(1.02); }
        .pontos-restantes { color: #ffcc00; font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Novo Herói ⚔️</h2>
        
        <input type="text" id="nome" placeholder="Nome do herói..." maxlength="15">
        
        <select id="classe">
            <option value="Guerreiro">Guerreiro</option>
            <option value="Arqueiro">Arqueiro</option>
            <option value="Mago">Mago</option>
        </select>

        <div class="stats-box">
            <span class="pontos-restantes">Pontos Disponíveis: <span id="pontos">5</span></span>
            
            <div class="stat-row">
                <span>💪 Força</span>
                <div>
                    <button onclick="ajustar('forca', -1)">-</button>
                    <span id="val-forca" style="margin: 0 10px;">0</span>
                    <button onclick="ajustar('forca', 1)">+</button>
                </div>
            </div>

            <div class="stat-row">
                <span>❤️ Vitalidade</span>
                <div>
                    <button onclick="ajustar('vitalidade', -1)">-</button>
