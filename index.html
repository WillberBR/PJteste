<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede da Família</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏠 Rede da Família</h1>
        
        <div id="login-area">
            <h3>Entrar no seu perfil</h3>
            <input type="text" id="userName" placeholder="Nome do familiar">
            <input type="password" id="userPass" placeholder="Sua senha única">
            <button onclick="fazerLogin()">Entrar</button>
            <p id="erro" style="color: #ff4d4d;"></p>
        </div>

        <div id="feed-area" style="display: none;">
    <h2 id="bemVindo"></h2>
    
    <div class="mural-input">
        <textarea id="textoMensagem" placeholder="Escreva um recado para a família..."></textarea>
        <button onclick="postarMensagem()">Postar Recado</button>
    </div>

    <div id="mural-mensagens">
        <p>Carregando recados...</p>
    </div>

    <button onclick="logout()" class="btn-sair">Sair</button>
</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
