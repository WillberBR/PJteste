<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural Família Cloud</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        
        /* Título único no topo */
        .main-title { border: 2px solid #00ff00; padding: 15px; border-radius: 10px; color: #00ff00; text-align: center; margin-bottom: 20px; text-transform: uppercase; }

        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        
        input { padding: 12px; border-radius: 5px; border: 1px solid #333; margin-bottom: 10px; background: #121212; color: white; width: 85%; outline: none; }
        input:focus { border-color: #00ff00; }
        
        .btn { background-color: #00ff00; color: #121212; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 95%; margin-top: 5px; }
        
        .recado-card { background: #252525; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 5px solid #00ff00; position: relative; }
        .excluir-btn { position: absolute; top: 10px; right: 10px; color: #ff4444; cursor: pointer; }
        .hora { font-size: 0.7em; color: #888; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="main-title">Mural da Família</h1>

        <div id="areaLogin" class="box">
            <h3>Login</h3>
            <input type="text" id="campoUsuario" placeholder="Usuário">
            <input type="password" id="campoSenha" placeholder="Senha">
            <button class="btn" onclick="fazerLogin()">ENTRAR</button>
        </div>

        <div id="areaPrivada" style="display: none;">
            <div class="box">
                <h3 id="boasVindas">Olá!</h3>
                <input type="text" id="novoRecado" placeholder="Digite sua mensagem...">
                <button class="btn" onclick="postarRecado()">POSTAR NA NUVEM</button>
            </div>
            
            <div id="listaRecados"></div>
            
            <div style="text-align: center;">
                <button class="btn" onclick="logout()" style="background:#333; color:white; width:50%; margin-top:30px;">SAIR</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnxNTCOWLPPsrIlu2_Kgd2l0qTZP-aUt8",
            authDomain: "mural-familia-9223d.firebaseapp.com",
            databaseURL: "https://mural-familia-9223d-default-rtdb.firebaseio.com/",
            projectId: "mural-familia-9223d",
            storageBucket: "mural-familia-9223d.firebasestorage.app",
            messagingSenderId: "577356833001",
            appId: "1:577356833001:web:0cdf6bca4c4289dadcd078"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function fazerLogin() {
            const user = document.getElementById('campoUsuario').value;
            const pass = document.getElementById('campoSenha').value;
            if(user.toLowerCase() === "admin" && pass === "1234") {
                localStorage.setItem('usuarioLogado', user);
                mostrarAreaPrivada(user);
            } else {
                alert("Usuário ou senha incorretos!");
            }
        }

        function mostrarAreaPrivada(nome) {
            // ESCONDE O LOGIN E MOSTRA O MURAL
            document.getElementById('areaLogin').style.display = 'none';
            document.getElementById('areaPrivada').style.display = 'block';
            document.getElementById('boasVindas').innerText = "Olá, " + nome + "!";
            ouvirRecados();
        }

        function postarRecado() {
            const input = document.getElementById('novoRecado');
            if (input.value.trim() === "") return;

            database.ref('mural').push({
                texto: input.value,
                autor: localStorage.getItem('usuarioLogado'),
                data: new Date().toLocaleString('pt-BR')
            });
            input.value = "";
        }

        function ouvirRecados() {
            database.ref('mural').on('value', (snapshot) => {
                const lista = document.getElementById('listaRecados');
                lista.innerHTML = "";
                const dados = snapshot.val();
                if (dados) {
                    Object.keys(dados).reverse().forEach(key => {
                        const item = dados[key];
                        lista.innerHTML += `
                            <div class="recado-card">
                                <span class="excluir-btn" onclick="excluirRecado('${key}')">X</span>
                                <strong>${item.autor}:</strong> ${item.texto}
                                <span class="hora">${item.data}</span>
                            </div>
                        `;
                    });
                }
            });
        }

        function excluirRecado(id) {
            if(confirm("Deseja apagar este recado?")) {
                database.ref('mural/' + id).remove();
            }
        }

        function logout() {
            localStorage.removeItem('usuarioLogado');
            location.reload();
        }

        // Verifica se já estava logado ao abrir
        const logado = localStorage.getItem('usuarioLogado');
        if(logado) {
            mostrarAreaPrivada(logado);
        }
    </script>
</body>
</html>
