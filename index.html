<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural da Família</title>
    <style>
        body { background-color: #121212; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { text-align: center; width: 100%; max-width: 400px; }
        h1 { border: 2px solid #00ff00; padding: 15px; border-radius: 10px; color: #00ff00; }
        input { padding: 12px; border-radius: 5px; border: 1px solid #333; margin-bottom: 10px; background: #1e1e1e; color: white; width: 80%; }
        .btn { background-color: #00ff00; color: #121212; padding: 12px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin: 5px; }
        .recado-card { background: #333; padding: 10px; border-radius: 5px; margin-bottom: 8px; border-left: 4px solid #00ff00; text-align: left; word-wrap: break-word; }
        .login-box, #areaPrivada { background: #1e1e1e; padding: 20px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mural Digital</h1>

        <div id="areaLogin" class="login-box">
            <h3>Entrar</h3>
            <input type="text" id="campoUsuario" placeholder="Usuário (admin)">
            <input type="password" id="campoSenha" placeholder="Senha (1234)">
            <button class="btn" onclick="fazerLogin()">ENTRAR</button>
            <p id="mensagemErro" style="color: #ff4444;"></p>
        </div>

        <div id="areaPrivada" style="display: none;">
            <h3 id="boasVindas">Bem-vindo!</h3>
            <div style="margin-bottom: 20px;">
                <input type="text" id="novoRecado" placeholder="Digite seu recado...">
                <button class="btn" onclick="postarRecado()">POSTAR</button>
            </div>
            
            <div id="listaRecados">
                </div>

            <button class="btn" onclick="logout()" style="background: #444; color: white; margin-top: 30px;">SAIR</button>
        </div>
    </div>

    <script>
        // Quando a página carrega, verifica login e mostra recados
        window.addEventListener('load', () => {
            const usuarioSalvo = localStorage.getItem('usuarioLogado');
            if (usuarioSalvo) {
                mostrarAreaPrivada(usuarioSalvo);
            }
        });

        function fazerLogin() {
            const user = document.getElementById('campoUsuario').value;
            const pass = document.getElementById('campoSenha').value;
            if (user === "admin" && pass === "1234") {
                localStorage.setItem('usuarioLogado', user);
                mostrarAreaPrivada(user);
            } else {
                document.getElementById('mensagemErro').innerText = "Dados incorretos!";
            }
        }

        function mostrarAreaPrivada(nome) {
            document.getElementById('areaLogin').style.display = 'none';
            document.getElementById('areaPrivada').style.display = 'block';
            document.getElementById('boasVindas').innerText = "Olá, " + nome + "!";
            exibirRecados();
        }

        function postarRecado() {
            const input = document.getElementById('novoRecado');
            const texto = input.value;
            if (texto.trim() === "") return;

            // Pega lista atual do LocalStorage ou cria uma nova
            let recados = JSON.parse(localStorage.getItem('mural')) || [];
            recados.push(texto);
            
            // Salva de volta
            localStorage.setItem('mural', JSON.stringify(recados));
            
            input.value = ""; // Limpa campo
            exibirRecados();  // Atualiza lista na tela
        }

        function exibirRecados() {
            const mural = document.getElementById('listaRecados');
            const recados = JSON.parse(localStorage.getItem('mural')) || [];
            
            // Inverte a ordem para o mais novo aparecer em cima
            mural.innerHTML = recados.reverse().map(msg => `
                <div class="recado-card">${msg}</div>
            `).join('');
        }

        function logout() {
            localStorage.removeItem('usuarioLogado');
            location.reload();
        }
    </script>
</body>
</html>
