<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede da Família</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="login-area">
            <h1>🏠 Rede da Família</h1>
            <input type="email" id="userName" placeholder="Seu e-mail">
            <input type="password" id="userPass" placeholder="Sua senha">
            <button onclick="fazerLogin()">Entrar</button>
            <p id="erro"></p>
        </div>

        <div id="feed-area" style="display: none;">
            
            <div id="perfil-usuario">
                <img id="perfil-foto" src="https://via.placeholder.com/80" alt="Foto de Perfil">
                <div class="perfil-info">
                    <h3 id="perfil-nome">Carregando...</h3>
                    <p id="perfil-bio">"Frase do perfil"</p>
                    <button onclick="toggleEdicao()" style="background: none; border: 1px solid #555; color: #888; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-bottom: 15px;">⚙️ Editar Perfil</button>

<div id="area-edicao" style="display: none; background: #1a1a1a; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333;">
    <h4 style="margin-top: 0;">Editar meu perfil</h4>
    <input type="text" id="edit-bio" placeholder="Nova bio/frase...">
    <input type="text" id="edit-foto" placeholder="Link da foto (URL)...">
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button onclick="salvarPerfil()" style="background: #00ff00; color: black; flex: 1;">Salvar</button>
        <button onclick="toggleEdicao()" style="background: #444; flex: 1;">Cancelar</button>
    </div>
</div>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

            <div class="mural-input">
                <textarea id="textoMensagem" placeholder="Escreva um recado para a família..."></textarea>
                <button onclick="postarMensagem()" class="btn-postar">Postar Recado</button>
            </div>

            <div id="mural-mensagens">
                <p>Buscando recados...</p>
            </div>

            <button onclick="logout()" class="btn-sair">Sair da Conta</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
