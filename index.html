<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede da Família</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="login-area">
            <h1>🏠 Rede da Família</h1>
            <input type="email" id="loginEmail" placeholder="Seu e-mail">
            <input type="password" id="loginSenha" placeholder="Sua senha">
            <button onclick="fazerLogin()">Entrar</button>
            <p id="erro"></p>
            
            <button onclick="window.location.href='cadastro.html'" style="background: transparent; border: 1px solid #444; color: #888; margin-top: 15px; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px;">
                Não tem conta? Criar Perfil
            </button>
        </div>

        <div id="feed-area" style="display: none;">
            
            <div id="perfil-usuario" style="text-align: center;">
                <div id="perfil-foto-container"></div>
                
                <div class="perfil-info">
                    <h3 id="perfil-nome">Carregando...</h3>
                    <p id="perfil-bio">"Bem-vindo à nossa rede!"</p>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

            <div class="mural-input">
                <textarea id="novoRecado" placeholder="Escreva um recado para a família..."></textarea>
                <button onclick="postarRecado()" class="btn-postar">Postar Recado</button>
            </div>

            <div id="mural-recados">
                <p>Buscando recados...</p>
            </div>

            <button onclick="sair()" class="btn-sair">Sair da Conta</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
