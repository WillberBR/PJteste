<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mundo Medieval - Aventura</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; }
        
        /* Cabeçalho do Personagem */
        .header-personagem {
            background: #111; padding: 15px; border-bottom: 2px solid #00ff00;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        .stat-box { text-align: center; }
        .stat-label { font-size: 12px; color: #666; display: block; }
        .stat-val { font-weight: bold; color: #00ff00; font-size: 18px; }

        /* Área de Combate */
        .main-game { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .monster-card {
            background: #1a1a1a; border: 1px solid #333; padding: 30px;
            border-radius: 20px; text-align: center; width: 300px; margin-top: 50px;
            cursor: pointer; transition: 0.1s;
        }
        .monster-card:active { transform: scale(0.95); border-color: #ff0000; }
        
        /* Log de Mensagens */
        #game-log {
            width: 300px; height: 100px; background: #0a0a0a; border: 1px solid #222;
            margin-top: 20px; padding: 10px; font-size: 13px; color: #aaa;
            overflow-y: auto; border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="header-personagem">
        <div class="stat-box">
            <span class="stat-label">HERÓI</span>
            <span id="display-nome" class="stat-val">...</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">NÍVEL</span>
            <span id="display-lvl" class="stat-val">1</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">OURO</span>
            <span id="display-ouro" class="stat-val">0</span>
        </div>
    </div>

    <div class="main-game">
        <div class="monster-card" onclick="atacar()">
            <h2 id="monster-name">👾 Slime de Esgoto</h2>
            <p style="color: #ff4444;">HP: <span id="monster-hp">10</span></p>
            <small style="color: #666;">Clique para atacar!</small>
        </div>

        <div id="game-log">Bem-vindo ao Reino!</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zkeshycglokyycuplczn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_iDavmG9sQzqW6jPrOCjsmQ_5ISCiZUF';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let heroi = null;
        let monsterHP = 10;

        // BUSCAR DADOS DO HERÓI AO ENTRAR
        async function carregarJogo() {
            const email = localStorage.getItem("usuario_logado_email");
            
            const { data, error } = await supabaseClient
                .from('personagens')
                .select('*')
                .eq('id_conta', email)
                .single();

            if (data) {
                heroi = data;
                document.getElementById('display-nome').innerText = heroi.nome_heroi;
                document.getElementById('display-lvl').innerText = heroi.nivel;
                document.getElementById('display-ouro').innerText = heroi.ouro;
            }
        }

        function atacar() {
            const dano = 1 + heroi.forca;
            monsterHP -= dano;
            
            log(`Você deu ${dano} de dano!`);

            if (monsterHP <= 0) {
                log(`⚔️ Monstro derrotado! +2 Ouro`);
                heroi.ouro += 2;
                document.getElementById('display-ouro').innerText = heroi.ouro;
                monsterHP = 10 + (heroi.nivel * 5); // Próximo monstro mais forte
                atualizarOuroBanco();
            }
            
            document.getElementById('monster-hp').innerText = monsterHP;
        }

        function log(msg) {
            const logBox = document.getElementById('game-log');
            logBox.innerHTML = `> ${msg}<br>` + logBox.innerHTML;
        }

        async function atualizarOuroBanco() {
            await supabaseClient
                .from('personagens')
                .update({ ouro: heroi.ouro })
                .eq('id', heroi.id);
        }

        carregarJogo();
    </script>
</body>
</html>
