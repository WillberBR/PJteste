<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mundo Medieval - Aventura</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .header { background: #111; padding: 20px; border-bottom: 2px solid #00ff00; display: flex; justify-content: space-around; }
        .stat-val { color: #00ff00; font-weight: bold; font-size: 20px; }
        .monster-area { margin-top: 50px; }
        .monster-card { background: #1a1a1a; padding: 40px; border-radius: 20px; display: inline-block; cursor: pointer; border: 2px solid #333; }
        .monster-card:active { transform: scale(0.95); }
        #game-log { margin-top: 20px; color: #888; font-size: 14px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="header">
        <div>HERÓI: <span id="display-nome" class="stat-val">...</span></div>
        <div>NÍVEL: <span id="display-lvl" class="stat-val">1</span></div>
        <div>XP: <span id="display-xp" class="stat-val">0</span></div>
    </div>

    <div class="monster-area">
        <div class="monster-card" onclick="atacar()">
            <h2>👾 SLIME</h2>
            <div style="color: #ff4444; font-size: 24px;">HP: <span id="monster-hp">10</span></div>
            <p>CLIQUE PARA ATACAR</p>
        </div>
    </div>

    <div id="game-log">>> Carregando herói...</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="combate.js"></script>
    <script>
        const SUPABASE_URL = 'https://zkeshycglokyycuplczn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_iDavmG9sQzqW6jPrOCjsmQ_5ISCiZUF';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let heroi = null;
        let monsterHP = 10;

        async function iniciar() {
            const email = localStorage.getItem("usuario_logado_email");
            if (!email) {
                alert("Sessão expirada. Faça login novamente.");
                window.location.href = "index.html";
                return;
            }

            try {
                const { data, error } = await supabaseClient
                    .from('personagens')
                    .select('*')
                    .eq('id_conta', email)
                    .single();

                if (error) throw error;

                if (data) {
                    heroi = data;
                    document.getElementById('display-nome').innerText = heroi.nome_heroi;
                    document.getElementById('display-lvl').innerText = heroi.nivel;
                    document.getElementById('display-xp').innerText = heroi.xp;
                    document.getElementById('game-log').innerText = ">> Herói pronto para o combate!";
                }
            } catch (err) {
                console.error(err);
                document.getElementById('game-log').innerText = ">> Erro ao carregar herói. Verifique o banco de dados.";
            }
        }

        function atacar() {
            if (!heroi) return;

            // Chama a função do combate.js
            const dano = calcularDano(heroi);
            monsterHP -= dano;
            
            const log = document.getElementById('game-log');
            log.innerHTML = `> Você deu ${dano} de dano!<br>` + log.innerHTML;

            if (monsterHP <= 0) {
                heroi.xp += 5;
                log.innerHTML = `<b style="color:yellow">> Inimigo derrotado! +5 XP</b><br>` + log.innerHTML;
                
                if (verificarLevelUp(heroi)) {
                    log.innerHTML = `<b style="color:#00ff00">> LEVEL UP! Nível ${heroi.nivel}</b><br>` + log.innerHTML;
                    document.getElementById('display-lvl').innerText = heroi.nivel;
                }

                monsterHP = 10 + (heroi.nivel * 5);
                document.getElementById('display-xp').innerText = heroi.xp;
                salvarNoBanco();
            }
            document.getElementById('monster-hp').innerText = monsterHP;
        }

        async function salvarNoBanco() {
            await supabaseClient
                .from('personagens')
                .update({ xp: heroi.xp, nivel: heroi.nivel, pontos_livres: heroi.pontos_livres })
                .eq('id', heroi.id);
        }

        iniciar();
    </script>
</body>
</html>
