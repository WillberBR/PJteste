<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mundo Medieval - Aventura</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* Barra Superior */
        .header { background: #111; padding: 15px; border-bottom: 2px solid #333; display: grid; grid-template-columns: 1fr 2fr; gap: 15px; position: sticky; top: 0; z-index: 10; }
        .info-personagem { text-align: left; padding-left: 10px; }
        .nome-heroi { font-size: 20px; color: #00ff00; font-weight: bold; display: block; }
        
        /* Container das Barras */
        .stats-bars { display: flex; flex-direction: column; gap: 8px; }
        .bar-container { width: 100%; height: 18px; background: #333; border-radius: 10px; position: relative; overflow: hidden; border: 1px solid #444; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.3s ease-in-out; }
        
        .hp-bar { background: linear-gradient(90deg, #ff4444, #880000); }
        .mp-bar { background: linear-gradient(90deg, #4444ff, #000088); }
        .xp-bar { background: linear-gradient(90deg, #ffcc00, #aa8800); }
        
        .bar-text { position: absolute; width: 100%; text-align: center; font-size: 11px; font-weight: bold; color: white; line-height: 18px; text-shadow: 1px 1px 2px black; }

        .mini-stats { display: flex; justify-content: space-around; background: #0a0a0a; padding: 5px; font-size: 12px; color: #888; border-bottom: 1px solid #222; }

        /* Animação de Impacto */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-anim { animation: shake 0.2s; }

        /* Monstros */
        .monster-area { margin-top: 40px; }
        .monster-card { background: #1a1a1a; padding: 40px; border-radius: 25px; display: inline-block; cursor: pointer; border: 2px solid #333; }
        
        #game-log { margin: 20px auto; width: 90%; max-width: 600px; background: #050505; border: 1px solid #222; padding: 15px; font-size: 14px; height: 120px; overflow-y: auto; border-radius: 10px; text-align: left; }

        /* Botões de Viagem */
        .btn-cidade { position: fixed; bottom: 20px; right: 20px; background: #ffcc00; color: black; border: none; padding: 15px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); transition: 0.3s; }
        .btn-cidade:hover { background: #ffaa00; transform: translateY(-3px); }
        .btn-voltar { position: fixed; bottom: 20px; left: 20px; background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 12px; }

        /* Modal Level Up */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; }
        #level-up-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #151515; border: 2px solid #00ff00; padding: 30px; border-radius: 20px; z-index: 1000; width: 280px; }
        .stat-upgrade { display: flex; justify-content: space-between; margin: 10px 0; }
        .btn-up { background: #00ff00; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div class="info-personagem">
            <span id="display-nome" class="nome-heroi">...</span>
            <span style="font-size: 12px;">Nível <span id="display-lvl">1</span></span>
        </div>
        <div class="stats-bars">
            <div class="bar-container"><div id="hp-fill" class="bar-fill hp-bar"></div><div class="bar-text">HP: <span id="hp-txt">0/0</span></div></div>
            <div class="bar-container"><div id="mp-fill" class="bar-fill mp-bar"></div><div class="bar-text">MP: <span id="mp-txt">0/0</span></div></div>
            <div class="bar-container"><div id="xp-fill" class="bar-fill xp-bar"></div><div class="bar-text">XP: <span id="xp-txt">0/0</span></div></div>
        </div>
    </div>

    <div class="mini-stats">
        <span>💪 FOR: <b id="display-for">0</b></span>
        <span>⚡ AGI: <b id="display-agi">0</b></span>
        <span>🧠 INT: <b id="display-int">0</b></span>
        <span>❤️ VIT: <b id="display-vit">0</b></span>
    </div>

    <div class="monster-area">
        <div id="card-monstro" class="monster-card" onclick="atacar()">
            <h2 id="monster-name">👾 SLIME DE ESGOTO</h2>
            <div style="color: #ff4444; font-size: 24px; font-weight: bold;">HP: <span id="monster-hp">10</span></div>
            <small style="color: #444;">CLIQUE PARA ATACAR</small>
        </div>
    </div>

    <div id="game-log">>> Iniciando caçada...</div>

    <button class="btn-cidade" onclick="irParaCidade()">🏃 FUGIR PARA A CIDADE</button>
    <button class="btn-voltar" onclick="window.location.href='selecao.html'">⬅ Sair do Jogo</button>

    <div id="modal-overlay"></div>
    <div id="level-up-modal">
        <h2 style="color: #00ff00;">🌟 LEVEL UP!</h2>
        <p>Pontos: <span id="modal-pontos" style="color: #ffcc00;">0</span></p>
        <div class="stat-upgrade"><span>Força</span> <button class="btn-up" onclick="distribuir('forca')">+</button></div>
        <div class="stat-upgrade"><span>Agilidade</span> <button class="btn-up" onclick="distribuir('agilidade')">+</button></div>
        <div class="stat-upgrade"><span>Vitalidade</span> <button class="btn-up" onclick="distribuir('vitalidade')">+</button></div>
        <div class="stat-upgrade"><span>Inteligência</span> <button class="btn-up" onclick="distribuir('inteligencia')">+</button></div>
        <button onclick="fecharModal()" style="margin-top:20px; width:100%; padding:10px; cursor:pointer;">Continuar</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="combate.js"></script>
    <script>
        const SUPABASE_URL = 'https://zkeshycglokyycuplczn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_iDavmG9sQzqW6jPrOCjsmQ_5ISCiZUF';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let heroi = null;
        let monsterHP = 10;

        async function iniciar() {
            const heroiId = localStorage.getItem("heroi_selecionado_id");
            const { data } = await supabaseClient.from('personagens').select('*').eq('id', heroiId).single();
            if (data) {
                heroi = data;
                atualizarInterface();
                if (heroi.pontos_livres > 0) abrirModal();
            }
        }

        function atualizarInterface() {
            const maxHP = 20 + (heroi.vitalidade * 10);
            const maxMP = 10 + (heroi.inteligencia * 5);
            const xpProxNivel = heroi.nivel * 20;

            document.getElementById('display-nome').innerText = heroi.nome_heroi;
            document.getElementById('display-lvl').innerText = heroi.nivel;
            document.getElementById('hp-txt').innerText = `${maxHP}/${maxHP}`;
            document.getElementById('mp-txt').innerText = `${maxMP}/${maxMP}`;
            document.getElementById('xp-txt').innerText = `${heroi.xp}/${xpProxNivel}`;

            document.getElementById('display-for').innerText = heroi.forca;
            document.getElementById('display-agi').innerText = heroi.agilidade;
            document.getElementById('display-int').innerText = heroi.inteligencia;
            document.getElementById('display-vit').innerText = heroi.vitalidade;

            document.getElementById('xp-fill').style.width = `${(heroi.xp / xpProxNivel) * 100}%`;
            document.getElementById('hp-fill').style.width = "100%";
            document.getElementById('mp-fill').style.width = "100%";
        }

        function atacar() {
            if (!heroi) return;
            
            const card = document.getElementById('card-monstro');
            card.classList.remove('shake-anim');
            void card.offsetWidth; 
            card.classList.add('shake-anim');

            const dano = calcularDano(heroi);
            monsterHP -= dano;
            
            escreverLog(dano > heroi.forca * 2 ? `🔥 CRÍTICO! ${dano} de dano!` : `Causou ${dano} de dano.`);

            if (monsterHP <= 0) {
                heroi.xp += 5;
                if (verificarLevelUp(heroi)) {
                    heroi.pontos_livres = (heroi.pontos_livres || 0) + 5;
                    abrirModal();
                }
                monsterHP = 10 + (heroi.nivel * 5);
                salvarProgresso();
                atualizarInterface();
            }
            document.getElementById('monster-hp').innerText = Math.max(0, monsterHP);
        }

        async function salvarProgresso() {
            await supabaseClient.from('personagens').update({ 
                xp: heroi.xp, nivel: heroi.nivel, pontos_livres: heroi.pontos_livres 
            }).eq('id', heroi.id);
        }

        function irParaCidade() {
            if(confirm("Deseja voltar para a Vila do Amanhecer?")) {
                window.location.href = "cidade.html";
            }
        }

        function abrirModal() {
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('level-up-modal').style.display = 'block';
            document.getElementById('modal-pontos').innerText = heroi.pontos_livres;
        }

        function fecharModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('level-up-modal').style.display = 'none';
            atualizarInterface();
        }

        async function distribuir(stat) {
            if (heroi.pontos_livres > 0) {
                heroi[stat]++;
                heroi.pontos_livres--;
                document.getElementById('modal-pontos').innerText = heroi.pontos_livres;
                await supabaseClient.from('personagens').update({ [stat]: heroi[stat], pontos_livres: heroi.pontos_livres }).eq('id', heroi.id);
                atualizarInterface();
            }
        }

        function escreverLog(msg) {
            const log = document.getElementById('game-log');
            log.innerHTML = `> ${msg}<br>` + log.innerHTML;
        }

        iniciar();
    </script>
</body>
</html>
