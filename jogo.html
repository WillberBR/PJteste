<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Mundo Medieval - Aventura</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Cabeçalho do Personagem */
        .header-personagem {
            background: #111; padding: 15px; border-bottom: 2px solid #00ff00;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            position: sticky; top: 0; z-index: 100;
        }
        .stat-box { text-align: center; }
        .stat-label { font-size: 10px; color: #666; display: block; text-transform: uppercase; }
        .stat-val { font-weight: bold; color: #00ff00; font-size: 18px; }

        /* Painel Lateral de Atributos */
        .painel-status {
            position: fixed; left: 20px; top: 100px;
            background: #111; padding: 20px; border: 1px solid #333;
            border-radius: 12px; width: 180px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }
        .painel-status h3 { color: #fffb00; margin: 0 0 15px 0; font-size: 16px; text-align: center; }
        .atributo-linha { display: flex; justify-content: space-between; margin-bottom: 12px; align-items: center; font-size: 14px; }
        .btn-up { 
            background: #00ff00; color: black; border: none; border-radius: 4px; 
            padding: 2px 8px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .btn-up:hover { background: #fff; transform: scale(1.1); }

        /* Área de Combate */
        .main-game { display: flex; flex-direction: column; align-items: center; padding: 20px; margin-left: 200px; }
        .monster-card {
            background: #1a1a1a; border: 2px solid #333; padding: 40px;
            border-radius: 25px; text-align: center; width: 280px; margin-top: 40px;
            cursor: pointer; transition: 0.1s; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .monster-card:active { transform: scale(0.92); border-color: #ff0000; }
        .monster-hp-bar { color: #ff4444; font-size: 20px; font-weight: bold; margin: 15px 0; }
        
        /* Log de Mensagens */
        #game-log {
            width: 350px; height: 120px; background: #050505; border: 1px solid #222;
            margin-top: 25px; padding: 12px; font-size: 13px; color: #888;
            overflow-y: auto; border-radius: 10px; line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="header-personagem">
        <div class="stat-box">
            <span class="stat-label">Herói</span>
            <span id="display-nome" class="stat-val">...</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Nível</span>
            <span id="display-lvl" class="stat-val">1</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Exp</span>
            <span id="display-xp" class="stat-val">0</span>
        </div>
        <div class="stat-box">
            <span class="stat-label
