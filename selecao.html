<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Seleção - Mundo Medieval</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .lista-personagens { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
        .card-heroi { background: #151515; border: 2px solid #333; border-radius: 15px; padding: 20px; cursor: pointer; position: relative; }
        .card-heroi:hover { border-color: #00ff00; }
        .btn-deletar { position: absolute; bottom: 10px; right: 10px; background: #ff4444; border: none; color: white; padding: 5px; border-radius: 5px; cursor: pointer; }
        .lvl-badge { position: absolute; top: 10px; right: 10px; background: #00ff00; color: black; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
        .btn-novo { margin-top: 40px; background: transparent; color: #00ff00; border: 2px solid #00ff00; padding: 10px 20px; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>SEUS HERÓIS ⚔️</h2>
    <div id="lista" class="lista-personagens"></div>
    <button class="btn-novo" onclick="window.location.href='personagem.html'">+ NOVO PERSONAGEM</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zkeshycglokyycuplczn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_iDavmG9sQzqW6jPrOCjsmQ_5ISCiZUF';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregar() {
            const email = localStorage.getItem("usuario_logado_email");
            const { data } = await supabaseClient.from('personagens').select('*').eq('id_conta', email).order('nivel', { ascending: false });
            
            const listaDiv = document.getElementById('lista');
            listaDiv.innerHTML = "";
            data.forEach(heroi => {
                const card = document.createElement('div');
                card.className = 'card-heroi';
                card.onclick = () => { localStorage.setItem("heroi_selecionado_id", heroi.id); window.location.href = "jogo.html"; };
                card.innerHTML = `
                    <div class="lvl-badge">LVL ${heroi.nivel}</div>
                    <h3>${heroi.nome_heroi}</h3>
                    <p>🛡️ ${heroi.classe}</p>
                    <p>💪 FOR: ${heroi.forca} | ❤️ VIT: ${heroi.vitalidade}</p>
                    <p>⚡ AGI: ${heroi.agilidade || 0} | 🧠 INT: ${heroi.inteligencia || 0}</p>
                    <button class="btn-deletar" onclick="deletarHeroi(event, ${heroi.id})">DELETAR</button>
                `;
                listaDiv.appendChild(card);
            });
        }

        async function deletarHeroi(event, id) {
            event.stopPropagation();
            if (confirm("Deletar herói?")) {
                await supabaseClient.from('personagens').delete().eq('id', id);
                location.reload();
            }
        }
        carregar();
    </script>
</body>
</html>
